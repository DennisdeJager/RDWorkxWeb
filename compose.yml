services:
  web:
    image: ${WEB_IMAGE_REF:-rdworkxwebsite-web:local}
    container_name: rdworkxwebsite-web
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${WEB_INTERNAL_PORT:-5175}
      APP_ENV: ${APP_ENV:-dev}
      PUBLIC_URL: ${PUBLIC_URL:-https://rdworkx.nl}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:5176}
    ports:
      - "${WEB_BIND_ADDRESS:-192.168.10.12}:${WEB_PORT:-5175}:${WEB_INTERNAL_PORT:-5175}"
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ${API_IMAGE_REF:-rdworkxwebsite-api:local}
    container_name: rdworkxwebsite-api
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${API_INTERNAL_PORT:-5176}
      APP_ENV: ${APP_ENV:-dev}
      PUBLIC_URL: ${PUBLIC_URL:-https://rdworkx.nl}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DATABASE_URL: ${DATABASE_URL:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_ALLOWED_HOSTNAMES: ${TURNSTILE_ALLOWED_HOSTNAMES:-www-dev.rdworkx.nl,rdworkx.nl,www.rdworkx.nl}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_FROM: ${CONTACT_FROM:-}
      CONTACT_TO: ${CONTACT_TO:-}
    ports:
      - "${API_BIND_ADDRESS:-192.168.10.12}:${API_PORT:-5176}:${API_INTERNAL_PORT:-5176}"

